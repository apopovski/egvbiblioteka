<?xml version='1.0' encoding='utf-8'?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml" xmlns:epub="http://www.idpf.org/2007/ops" epub:prefix="z3998: http://www.daisy.org/z3998/2012/vocab/structure/#" lang="en" xml:lang="en"><head/><body><div class="chapter" id="content64"><h1 class="sectionhead"> Odeljak 12 — Izazov časa</h1><p class="introquote"> <em>Zagovornici umerenosti ne uspevaju da ispune svoju dužnost u potpunosti ukoliko ne iskoriste svoj uticaj propisima i primerom – usmenim rečima, perom i glasanjem – u korist zabrane i potpune apstinencije</em> . <span class="egw-eng" title="GV 387.1">– Jevanđeoski radnici, 387, 388</span> .</p></div></body></html>
